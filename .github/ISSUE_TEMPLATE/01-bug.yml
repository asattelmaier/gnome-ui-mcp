name: Bug report
description: File a bug report for gnome-ui-mcp
title: "<short description of the bug>"
type: Bug
body:
  - id: description
    type: textarea
    attributes:
      label: Description of the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - id: reproduce
    type: textarea
    attributes:
      label: Reproduction
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Use tool '...'
        2. Then use tool '...'

  - id: expectation
    type: textarea
    attributes:
      label: Expectation
      description: A clear and concise description of what you expected to happen.

  - id: mcp-configuration
    type: textarea
    attributes:
      label: MCP configuration

  - id: gnome-ui-mcp-version
    type: input
    attributes:
      label: gnome-ui-mcp version
    validations:
      required: true

  - id: gnome-version
    type: input
    attributes:
      label: GNOME Shell version

  - id: coding-agent-version
    type: input
    attributes:
      label: Coding agent version

  - id: model-version
    type: input
    attributes:
      label: Model version

  - id: chat-log
    type: input
    attributes:
      label: Chat log

  - id: operating-system
    type: input
    attributes:
      label: Operating system
      description: For example Ubuntu 24.04, Fedora 41, or Arch Linux.

  - id: session-type
    type: dropdown
    attributes:
      label: Session type
      options:
        - Wayland
        - X11
        - Other

  - type: checkboxes
    id: provide-pr
    attributes:
      label: Extra checklist
      options:
        - label: I want to provide a PR to fix this bug
